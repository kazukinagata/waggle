<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — Calendar</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="filter-bar.css">
  <link rel="stylesheet" href="detail-panel.css">
  <style>
    /* Nav bar */
    .nav-bar {
      padding: 12px 24px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-btn {
      background: var(--surface-secondary);
      border: none;
      color: var(--label-secondary);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), color var(--transition);
      font-family: var(--font);
    }

    .nav-btn:hover {
      background: var(--surface-tertiary);
      color: var(--label-primary);
    }

    .today-btn {
      background: var(--surface-secondary);
      border: none;
      color: var(--blue);
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: background var(--transition);
    }

    .today-btn:hover { background: var(--surface-tertiary); }

    .month-label {
      font-size: 16px;
      font-weight: 600;
      min-width: 180px;
    }

    /* Calendar grid */
    main { padding: 0 24px 24px; }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border: 0.5px solid var(--separator);
      border-radius: var(--radius-card);
      overflow: hidden;
    }

    .day-header {
      padding: 10px 8px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--label-tertiary);
      background: var(--surface-primary);
      border-bottom: 0.5px solid var(--separator);
    }

    .day-cell {
      min-height: 110px;
      padding: 6px;
      border-right: 0.5px solid var(--separator);
      border-bottom: 0.5px solid var(--separator);
      background: transparent;
      transition: background var(--transition);
      position: relative;
    }

    .day-cell:nth-child(7n) { border-right: none; }
    .day-cell:hover { background: var(--surface-tertiary); }
    .day-cell.other-month { opacity: 0.3; }
    .day-cell.today { background: rgba(10, 132, 255, 0.08); }

    .day-number {
      font-size: 13px;
      font-weight: 500;
      color: var(--label-secondary);
      margin-bottom: 4px;
      padding: 2px 4px;
    }

    .day-cell.today .day-number {
      color: var(--blue);
      font-weight: 700;
    }

    .task-pills {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .task-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 7px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      color: var(--label-primary);
      cursor: pointer;
      transition: filter var(--transition);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-pill:hover { filter: brightness(1.2); }

    .task-pill.s-backlog  { background: rgba(152,152,157,0.2); }
    .task-pill.s-ready    { background: rgba(94,92,230,0.2); }
    .task-pill.s-progress { background: rgba(255,159,10,0.2); }
    .task-pill.s-review   { background: rgba(191,90,242,0.2); }
    .task-pill.s-done     { background: rgba(48,209,88,0.2); }
    .task-pill.s-blocked  { background: rgba(255,69,58,0.2); }

    .more-count {
      font-size: 10px;
      color: var(--label-tertiary);
      padding: 2px 4px;
      cursor: pointer;
    }

    .more-count:hover { color: var(--label-secondary); }

    /* Unscheduled section */
    .unscheduled-section { margin-top: 20px; }

    .unscheduled-header {
      font-size: 13px;
      font-weight: 600;
      color: var(--label-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .unscheduled-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .unscheduled-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-badge);
      background: var(--surface-secondary);
      font-size: 12px;
      color: var(--label-secondary);
      cursor: pointer;
      transition: background var(--transition);
    }

    .unscheduled-chip:hover { background: var(--surface-tertiary); }

    /* Day tasks popover (for +N more) */
    .popover-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
    }

    .popover-overlay.show { display: block; }

    .popover {
      position: fixed;
      z-index: 201;
      background: var(--surface-primary);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-radius: var(--radius-card);
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      padding: 16px 20px;
      min-width: 280px;
      max-width: 360px;
      display: none;
    }

    .popover.show { display: block; }

    .popover-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
<header>
  <div class="header-title-group">
    <h1>Calendar</h1>
    <div class="header-meta">
      <div class="sse-indicator">
        <span class="sse-dot disconnected" id="sse-dot"></span>
        <span id="sse-status">Connecting...</span>
      </div>
      <div class="header-stats">
        <span id="task-count"></span>
        <span id="updated-at"></span>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="Waggle.refreshTasks()" title="Refresh"><span class="refresh-icon">&#x21BB;</span></button>
    </div>
  </div>
  <a href="/selector.html" class="back-link">&#8592; Views</a>
</header>

<div class="nav-bar">
  <button class="nav-btn" id="prev-month">&#8249;</button>
  <button class="today-btn" id="today-btn">Today</button>
  <button class="nav-btn" id="next-month">&#8250;</button>
  <span class="month-label" id="month-label"></span>
</div>

<div id="filter-bar"></div>

<main>
  <div id="calendar-container"></div>
  <div class="unscheduled-section" id="unscheduled-section" style="display:none">
    <div class="unscheduled-header">Unscheduled</div>
    <div class="unscheduled-list" id="unscheduled-list"></div>
  </div>
</main>

<div class="popover-overlay" id="popover-overlay"></div>
<div class="popover" id="popover"></div>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script src="filter-bar.js"></script>
<script src="detail-panel.js"></script>
<script>
  var W = Waggle;
  var currentYear = new Date().getFullYear();
  var currentMonth = new Date().getMonth();
  var MAX_PILLS = 3;

  function render() {
    var hierarchy = W.buildHierarchy(W.allTasks);
    var filtered = W.getFiltered();
    var scheduled = {};
    var unscheduled = [];

    filtered.forEach(function (t) {
      if (t.dueDate) {
        if (!scheduled[t.dueDate]) scheduled[t.dueDate] = [];
        scheduled[t.dueDate].push(t);
      } else {
        unscheduled.push(t);
      }
    });

    document.getElementById('task-count').textContent = filtered.length + ' tasks';

    var year = currentYear;
    var month = currentMonth;
    var firstDay = new Date(year, month, 1);
    var lastDay = new Date(year, month + 1, 0);
    var startDow = firstDay.getDay();
    var daysInMonth = lastDay.getDate();

    var monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    document.getElementById('month-label').textContent = monthNames[month] + ' ' + year;

    var prevLast = new Date(year, month, 0).getDate();
    var totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;

    var html = '<div class="calendar-grid">';
    var dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    dayNames.forEach(function (d) { html += '<div class="day-header">' + d + '</div>'; });

    for (var i = 0; i < totalCells; i++) {
      var day, dateStr, isOther = false;
      if (i < startDow) {
        day = prevLast - startDow + i + 1;
        var pm = month === 0 ? 11 : month - 1;
        var py = month === 0 ? year - 1 : year;
        dateStr = py + '-' + String(pm + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
        isOther = true;
      } else if (i >= startDow + daysInMonth) {
        day = i - startDow - daysInMonth + 1;
        var nm = month === 11 ? 0 : month + 1;
        var ny = month === 11 ? year + 1 : year;
        dateStr = ny + '-' + String(nm + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
        isOther = true;
      } else {
        day = i - startDow + 1;
        dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
      }

      var isToday = dateStr === W.today;
      var cls = ['day-cell'];
      if (isOther) cls.push('other-month');
      if (isToday) cls.push('today');

      html += '<div class="' + cls.join(' ') + '">';
      html += '<div class="day-number">' + day + '</div>';
      html += '<div class="task-pills">';

      var dayTasks = scheduled[dateStr] || [];
      var shown = dayTasks.slice(0, MAX_PILLS);
      var remaining = dayTasks.length - MAX_PILLS;

      shown.forEach(function (t) {
        var pDot = t.priority ? '<span class="priority-dot ' + W.priorityClass(t.priority) + '"></span>' : '';
        var parent = hierarchy.parentOf[t.id];
        var pillLabel = parent ? W.esc(parent.title) + ' > ' + W.esc(t.title) : W.esc(t.title);
        html += '<div class="task-pill ' + W.statusClass(t.status) + '" onclick="onTaskClick(event,\'' + t.id + '\')" data-task-id="' + t.id + '" title="' + W.esc(t.title) + '">' + pDot + '<span>' + pillLabel + '</span></div>';
      });

      if (remaining > 0) {
        html += '<div class="more-count" onclick="showDayTasks(event,\'' + dateStr + '\')">+' + remaining + ' more</div>';
      }

      html += '</div></div>';
    }

    html += '</div>';
    document.getElementById('calendar-container').innerHTML = html;

    var unschedSection = document.getElementById('unscheduled-section');
    var unschedList = document.getElementById('unscheduled-list');
    if (unscheduled.length > 0) {
      unschedSection.style.display = '';
      unschedList.innerHTML = unscheduled.map(function (t) {
        var pDot = t.priority ? '<span class="priority-dot ' + W.priorityClass(t.priority) + '"></span>' : '';
        return '<div class="unscheduled-chip" onclick="onTaskClick(event,\'' + t.id + '\')" data-task-id="' + t.id + '">' + pDot + '<span class="badge ' + W.statusClass(t.status) + '" style="padding:2px 6px;font-size:10px;">' + W.esc(t.status) + '</span>' + W.esc(t.title) + '</div>';
      }).join('');
    } else {
      unschedSection.style.display = 'none';
    }
  }

  function onTaskClick(event, taskId) {
    event.stopPropagation();
    if (W.openDetail) W.openDetail(taskId);
  }

  function showDayTasks(event, dateStr) {
    event.stopPropagation();
    var filtered = W.getFiltered().filter(function (t) { return t.dueDate === dateStr; });
    var popover = document.getElementById('popover');
    var overlay = document.getElementById('popover-overlay');

    var html = '<div class="popover-title">' + dateStr + '</div>';
    filtered.forEach(function (t) {
      var pDot = t.priority ? '<span class="priority-dot ' + W.priorityClass(t.priority) + '"></span>' : '';
      html += '<div class="task-pill ' + W.statusClass(t.status) + '" onclick="onTaskClick(event,\'' + t.id + '\')" style="margin-bottom:4px">' + pDot + '<span>' + W.esc(t.title) + '</span></div>';
    });

    popover.innerHTML = html;

    var rect = event.target.getBoundingClientRect();
    var top = rect.bottom + 8;
    var left = rect.left;
    if (left + 320 > window.innerWidth) left = window.innerWidth - 340;
    if (left < 10) left = 10;
    if (top + 200 > window.innerHeight) top = rect.top - 210;

    popover.style.top = top + 'px';
    popover.style.left = left + 'px';
    popover.classList.add('show');
    overlay.classList.add('show');
  }

  document.getElementById('popover-overlay').addEventListener('click', function () {
    document.getElementById('popover').classList.remove('show');
    document.getElementById('popover-overlay').classList.remove('show');
  });

  document.getElementById('prev-month').addEventListener('click', function () {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    W.saveFiltersToURL({ month: currentYear + '-' + String(currentMonth + 1).padStart(2, '0') });
    render();
  });

  document.getElementById('next-month').addEventListener('click', function () {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    W.saveFiltersToURL({ month: currentYear + '-' + String(currentMonth + 1).padStart(2, '0') });
    render();
  });

  document.getElementById('today-btn').addEventListener('click', function () {
    var now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    W.saveFiltersToURL({});
    render();
  });

  W.initKeyboard({
    getNavigableTasks: function () {
      return W.getFiltered().filter(function (t) { return t.dueDate; }).map(function (t) { return t.id; });
    },
    getTaskElement: function (taskId) {
      return document.querySelector('[data-task-id="' + taskId + '"]');
    }
  });

  var extra = W.loadFiltersFromURL();
  if (extra.month) {
    var parts = extra.month.split('-');
    currentYear = parseInt(parts[0]);
    currentMonth = parseInt(parts[1]) - 1;
  }

  W.onDataUpdate = render;
  W.initData();
</script>
</body>
</html>
