<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — List View</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="filter-bar.css">
  <link rel="stylesheet" href="detail-panel.css">
  <style>
    /* Table */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    thead th {
      padding: 10px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--label-tertiary);
      border-bottom: 0.5px solid var(--separator);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color var(--transition);
    }

    thead th:hover { color: var(--label-secondary); }

    thead th .sort-arrow {
      display: inline-block;
      margin-left: 4px;
      font-size: 10px;
      opacity: 0.4;
    }

    thead th.sorted .sort-arrow { opacity: 1; color: var(--blue); }
    thead th.sorted { color: var(--label-secondary); }

    tbody tr {
      border-bottom: 0.5px solid var(--separator);
      transition: background var(--transition);
      cursor: pointer;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface-tertiary); }

    td {
      padding: 13px 16px;
      vertical-align: top;
    }

    .title-cell { max-width: 280px; }

    .title-text {
      font-weight: 500;
      color: var(--label-primary);
      line-height: 1.4;
      word-break: break-word;
    }

    .title-desc {
      font-size: 12px;
      color: var(--label-secondary);
      margin-top: 4px;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s var(--transition);
    }

    tr.expanded .title-desc { max-height: 200px; }

    tr.subtask-row .title-cell { padding-left: 40px; }
    tr.subtask-row .title-text::before {
      content: '\2514 ';
      color: var(--label-tertiary);
      font-family: monospace;
    }

    main { padding: 0 24px 24px; }
  </style>
</head>
<body>
<header>
  <div class="header-title-group">
    <h1>Tasks</h1>
    <div class="header-meta">
      <div class="sse-indicator">
        <span class="sse-dot disconnected" id="sse-dot"></span>
        <span id="sse-status">Connecting...</span>
      </div>
      <div class="header-stats">
        <span id="task-count"></span>
        <span id="updated-at"></span>
      </div>
    </div>
  </div>
  <a href="/selector.html" class="back-link">&#8592; Views</a>
</header>

<div id="filter-bar"></div>

<main>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-sort="title">Title <span class="sort-arrow">&#9650;</span></th>
          <th data-sort="status">Status <span class="sort-arrow">&#9650;</span></th>
          <th data-sort="priority">Priority <span class="sort-arrow">&#9650;</span></th>
          <th data-sort="executor">Executor <span class="sort-arrow">&#9650;</span></th>
          <th data-sort="assignee">Assignee <span class="sort-arrow">&#9650;</span></th>
          <th data-sort="dueDate">Due Date <span class="sort-arrow">&#9650;</span></th>
          <th>Tags</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="empty-state" id="empty" style="display:none">
    <p>No tasks found</p>
    <small>Adjust filters or check your data source connection</small>
  </div>
</main>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script src="filter-bar.js"></script>
<script src="detail-panel.js"></script>
<script>
  var W = Waggle;
  var sortState = { column: '', direction: 'asc' };

  var statusOrder = { Backlog: 0, Ready: 1, 'In Progress': 2, 'In Review': 3, Blocked: 4, Done: 5 };
  var priorityOrder = { Urgent: 0, High: 1, Medium: 2, Low: 3 };

  function getOrderedTasks(tasks, childrenOf) {
    var childIds = new Set();
    Object.values(childrenOf).forEach(function (arr) { arr.forEach(function (c) { childIds.add(c.id); }); });
    var ordered = [];
    tasks.forEach(function (t) {
      if (childIds.has(t.id)) return;
      ordered.push(t);
      if (childrenOf[t.id]) {
        childrenOf[t.id].forEach(function (c) { ordered.push(c); });
      }
    });
    return ordered;
  }

  function applySorting(tasks) {
    if (!sortState.column) return tasks;
    var dir = sortState.direction === 'asc' ? 1 : -1;
    return tasks.slice().sort(function (a, b) {
      var va, vb;
      switch (sortState.column) {
        case 'title': va = a.title.toLowerCase(); vb = b.title.toLowerCase(); break;
        case 'status': va = statusOrder[a.status] || 0; vb = statusOrder[b.status] || 0; break;
        case 'priority': va = priorityOrder[a.priority] !== undefined ? priorityOrder[a.priority] : 99; vb = priorityOrder[b.priority] !== undefined ? priorityOrder[b.priority] : 99; break;
        case 'executor': va = a.executor || 'zzz'; vb = b.executor || 'zzz'; break;
        case 'assignee': va = (a.assignee && a.assignee[0]) ? a.assignee[0].name.toLowerCase() : 'zzz'; vb = (b.assignee && b.assignee[0]) ? b.assignee[0].name.toLowerCase() : 'zzz'; break;
        case 'dueDate': va = a.dueDate || '9999-99-99'; vb = b.dueDate || '9999-99-99'; break;
        default: return 0;
      }
      if (va < vb) return -1 * dir;
      if (va > vb) return 1 * dir;
      return 0;
    });
  }

  function render() {
    var filtered = W.getFiltered();
    var tbody = document.getElementById('tbody');
    var empty = document.getElementById('empty');

    if (filtered.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';

    var sorted = applySorting(filtered);
    var hierarchy = W.buildHierarchy(sorted);
    var ordered = sortState.column ? sorted : getOrderedTasks(sorted, hierarchy.childrenOf);

    tbody.innerHTML = ordered.map(function (t) {
      var isSubtask = !!hierarchy.parentOf[t.id];
      var stats = hierarchy.statsOf[t.id];
      var progressBadge = stats
        ? '<span class="subtask-progress">' + stats.done + '/' + stats.total + '<span class="subtask-progress-bar"><span class="subtask-progress-bar-fill" style="width:' + Math.round(stats.done / stats.total * 100) + '%"></span></span></span>'
        : '';
      return '<tr class="' + (isSubtask ? 'subtask-row' : '') + '" onclick="onRowClick(event,\'' + t.id + '\')" data-task-id="' + t.id + '">' +
        '<td class="title-cell">' +
          '<div class="title-text">' + W.esc(t.title) + progressBadge + '</div>' +
          (t.description ? '<div class="title-desc">' + W.esc(t.description) + '</div>' : '') +
        '</td>' +
        '<td><span class="badge ' + W.statusClass(t.status) + '">' + W.esc(t.status) + '</span></td>' +
        '<td>' + (t.priority ? '<span class="badge ' + W.priorityClass(t.priority) + '">' + W.esc(t.priority) + '</span>' : '<span style="color:var(--label-tertiary)">\u2014</span>') + '</td>' +
        '<td>' + (t.executor ? '<span class="badge" style="background:var(--surface-tertiary);color:var(--label-secondary)">' + W.esc(t.executor) + '</span>' : '<span style="color:var(--label-tertiary)">\u2014</span>') + '</td>' +
        '<td><div class="assignee">' + (t.assignee || []).map(function (a) { return '<div class="avatar" title="' + W.esc(a.name) + '">' + W.initials(a.name) + '</div>'; }).join('') + (!t.acknowledgedAt && t.assignee && t.assignee.length ? ' <span class="badge unack" title="Not yet seen by assignee">unseen</span>' : '') + '</div></td>' +
        '<td>' + W.formatDate(t.dueDate) + '</td>' +
        '<td><div class="tags">' + (t.tags || []).map(function (g) { return '<span class="tag">' + W.esc(g) + '</span>'; }).join('') + '</div></td>' +
      '</tr>';
    }).join('');
  }

  function onRowClick(event, taskId) {
    if (W.openDetail) {
      W.openDetail(taskId);
    } else {
      W.copyId(taskId);
    }
  }

  // Column sorting
  document.querySelectorAll('thead th[data-sort]').forEach(function (th) {
    th.addEventListener('click', function () {
      var col = th.dataset.sort;
      if (sortState.column === col) {
        sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
      } else {
        sortState.column = col;
        sortState.direction = 'asc';
      }
      // Update UI
      document.querySelectorAll('thead th').forEach(function (h) {
        h.classList.remove('sorted');
        var arrow = h.querySelector('.sort-arrow');
        if (arrow) arrow.innerHTML = '&#9650;';
      });
      th.classList.add('sorted');
      var arrow = th.querySelector('.sort-arrow');
      if (arrow) arrow.innerHTML = sortState.direction === 'asc' ? '&#9650;' : '&#9660;';
      W.saveFiltersToURL({ sort: sortState.column, dir: sortState.direction });
      render();
    });
  });

  // Keyboard navigation config
  W.initKeyboard({
    getNavigableTasks: function () {
      return W.getFiltered().map(function (t) { return t.id; });
    },
    getTaskElement: function (taskId) {
      return document.querySelector('tr[data-task-id="' + taskId + '"]');
    }
  });

  // Load URL state
  var extra = W.loadFiltersFromURL();
  if (extra.sort) {
    sortState.column = extra.sort;
    sortState.direction = extra.dir || 'asc';
    var th = document.querySelector('th[data-sort="' + sortState.column + '"]');
    if (th) {
      th.classList.add('sorted');
      var arrow = th.querySelector('.sort-arrow');
      if (arrow) arrow.innerHTML = sortState.direction === 'asc' ? '&#9650;' : '&#9660;';
    }
  }

  W.onDataUpdate = render;
  W.initData();
</script>
</body>
</html>
