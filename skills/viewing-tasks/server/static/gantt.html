<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — Gantt Chart</title>
  <style>
    :root {
      --bg: #000000;
      --surface-primary: rgba(28, 28, 30, 0.8);
      --surface-secondary: rgba(44, 44, 46, 0.6);
      --surface-tertiary: rgba(58, 58, 60, 0.4);
      --separator: rgba(84, 84, 88, 0.35);
      --label-primary: #ffffff;
      --label-secondary: rgba(235, 235, 245, 0.6);
      --label-tertiary: rgba(235, 235, 245, 0.3);
      --blue: #0a84ff;
      --green: #30d158;
      --orange: #ff9f0a;
      --red: #ff453a;
      --purple: #bf5af2;
      --indigo: #5e5ce6;
      --gray: #98989d;
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      --radius-card: 12px;
      --radius-badge: 8px;
      --radius-pill: 20px;
      --shadow: 0 0 0 0.5px rgba(0,0,0,0.3), 0 2px 12px rgba(0,0,0,0.3);
      --transition: cubic-bezier(0.25, 0.46, 0.45, 0.94) 250ms;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--label-primary);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface-primary);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--separator);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-title-group {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 200px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--label-primary);
      letter-spacing: -0.01em;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sse-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--label-secondary);
    }

    .sse-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      flex-shrink: 0;
    }

    .sse-dot.disconnected { background: var(--red); }

    .header-stats {
      font-size: 12px;
      color: var(--label-tertiary);
      display: flex;
      gap: 10px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      background: var(--surface-secondary);
      color: var(--label-secondary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: background var(--transition), color var(--transition);
    }

    .back-link:hover {
      background: var(--surface-tertiary);
      color: var(--label-primary);
    }

    .controls-bar {
      padding: 12px 24px;
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .search-wrap::before {
      content: '';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      background: none;
      border: 1.5px solid var(--label-tertiary);
      border-radius: 50%;
      box-sizing: border-box;
    }

    .search-wrap::after {
      content: '';
      position: absolute;
      left: 25px;
      top: 50%;
      transform: translateY(-10%) rotate(-45deg);
      width: 1.5px;
      height: 6px;
      background: var(--label-tertiary);
      border-radius: 1px;
    }

    .search-input {
      background: var(--surface-secondary);
      border: none;
      color: var(--label-primary);
      padding: 8px 14px 8px 36px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-family: var(--font);
      width: 220px;
      outline: none;
      transition: background var(--transition);
    }

    .search-input::placeholder { color: var(--label-tertiary); }
    .search-input:focus { background: var(--surface-tertiary); }

    .segmented-control {
      display: inline-flex;
      align-items: center;
      background: var(--surface-tertiary);
      border-radius: var(--radius-badge);
      padding: 2px;
      gap: 0;
      flex-wrap: wrap;
    }

    .segment {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--label-secondary);
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      white-space: nowrap;
      transition: background var(--transition), color var(--transition), box-shadow var(--transition);
      user-select: none;
    }

    .segment:hover { color: var(--label-primary); }

    .segment.active {
      background: var(--surface-primary);
      color: var(--label-primary);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .s-backlog  { background: rgba(152,152,157,0.15); color: var(--gray); }
    .s-ready    { background: rgba(94,92,230,0.15);   color: var(--indigo); }
    .s-progress { background: rgba(255,159,10,0.15);  color: var(--orange); }
    .s-review   { background: rgba(191,90,242,0.15);  color: var(--purple); }
    .s-done     { background: rgba(48,209,88,0.15);   color: var(--green); }

    .p-urgent { background: rgba(255,69,58,0.15);  color: var(--red); }
    .p-high   { background: rgba(255,159,10,0.15); color: var(--orange); }
    .p-medium { background: rgba(10,132,255,0.15); color: var(--blue); }
    .p-low    { background: rgba(152,152,157,0.15); color: var(--gray); }

    /* Gantt layout */
    main {
      padding: 0 24px 24px;
      overflow: hidden;
    }

    .gantt-wrapper {
      display: flex;
      border: 0.5px solid var(--separator);
      border-radius: var(--radius-card);
      overflow: hidden;
      position: relative;
    }

    .gantt-left {
      min-width: 250px;
      max-width: 250px;
      background: var(--surface-primary);
      border-right: 0.5px solid var(--separator);
      flex-shrink: 0;
      z-index: 10;
    }

    .gantt-left-header {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--label-tertiary);
      border-bottom: 0.5px solid var(--separator);
      background: var(--surface-primary);
    }

    .gantt-task-row {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 16px;
      border-bottom: 0.5px solid var(--separator);
      cursor: pointer;
      transition: background var(--transition);
    }

    .gantt-task-row:hover { background: var(--surface-tertiary); }
    .gantt-task-row:last-child { border-bottom: none; }

    .gantt-task-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .gantt-task-name.no-date {
      color: var(--label-tertiary);
    }

    .priority-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .priority-dot.p-urgent { background: var(--red); }
    .priority-dot.p-high   { background: var(--orange); }
    .priority-dot.p-medium { background: var(--blue); }
    .priority-dot.p-low    { background: var(--gray); }

    .gantt-right {
      flex: 1;
      overflow-x: auto;
      position: relative;
    }

    .gantt-timeline {
      position: relative;
      min-width: 100%;
    }

    .gantt-date-header {
      display: flex;
      height: 52px;
      border-bottom: 0.5px solid var(--separator);
      position: sticky;
      top: 0;
      background: var(--surface-primary);
      z-index: 5;
    }

    .gantt-date-cell {
      min-width: 40px;
      width: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-right: 0.5px solid var(--separator);
      flex-shrink: 0;
    }

    .gantt-date-cell:last-child { border-right: none; }

    .gantt-date-dow {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--label-tertiary);
    }

    .gantt-date-day {
      font-size: 13px;
      font-weight: 500;
      color: var(--label-secondary);
    }

    .gantt-date-cell.today .gantt-date-day {
      color: var(--blue);
      font-weight: 700;
    }

    .gantt-date-cell.weekend {
      background: rgba(255,255,255,0.02);
    }

    .gantt-bars {
      position: relative;
    }

    .gantt-bar-row {
      height: 40px;
      position: relative;
      border-bottom: 0.5px solid var(--separator);
    }

    .gantt-bar-row:last-child { border-bottom: none; }

    .gantt-bar-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
    }

    .gantt-bar-bg-cell {
      min-width: 40px;
      width: 40px;
      border-right: 0.5px solid var(--separator);
      flex-shrink: 0;
    }

    .gantt-bar-bg-cell.weekend { background: rgba(255,255,255,0.02); }
    .gantt-bar-bg-cell:last-child { border-right: none; }

    .gantt-bar {
      position: absolute;
      top: 8px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--label-primary);
      cursor: pointer;
      transition: filter var(--transition);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 2;
    }

    .gantt-bar:hover { filter: brightness(1.3); }

    .gantt-bar.s-backlog  { background: rgba(152,152,157,0.35); }
    .gantt-bar.s-ready    { background: rgba(94,92,230,0.35); }
    .gantt-bar.s-progress { background: rgba(255,159,10,0.35); }
    .gantt-bar.s-review   { background: rgba(191,90,242,0.35); }
    .gantt-bar.s-done     { background: rgba(48,209,88,0.35); }

    .gantt-bar.no-date {
      background: rgba(152,152,157,0.15);
      border: 1px dashed var(--gray);
      color: var(--label-tertiary);
    }

    .parent-label {
      font-size: 10px;
      color: var(--label-tertiary);
      font-weight: 400;
      margin-right: 4px;
    }

    /* Today line */
    .today-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--red);
      z-index: 3;
      pointer-events: none;
    }

    .today-line::before {
      content: 'Today';
      position: absolute;
      top: -20px;
      left: -16px;
      font-size: 9px;
      font-weight: 600;
      color: var(--red);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* SVG arrows */
    .dependency-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .dep-arrow {
      fill: none;
      stroke: var(--label-tertiary);
      stroke-width: 1.5;
      opacity: 0.5;
    }

    .dep-arrowhead {
      fill: var(--label-tertiary);
      opacity: 0.5;
    }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--label-tertiary);
    }

    .empty-state p {
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--label-secondary);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--surface-primary);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      color: var(--label-primary);
      padding: 10px 18px;
      border-radius: var(--radius-card);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 999;
      box-shadow: var(--shadow);
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<header>
  <div class="header-title-group">
    <h1>Gantt Chart</h1>
    <div class="header-meta">
      <div class="sse-indicator">
        <span class="sse-dot disconnected" id="sse-dot"></span>
        <span id="sse-status">Connecting...</span>
      </div>
      <div class="header-stats">
        <span id="task-count"></span>
        <span id="updated-at"></span>
      </div>
    </div>
  </div>
  <a href="/selector.html" class="back-link">&#8592; Views</a>
</header>

<div class="controls-bar">
  <div class="search-wrap">
    <input type="text" id="search" class="search-input" placeholder="Search tasks...">
  </div>

  <input type="hidden" id="filter-status" value="">
  <div class="segmented-control" id="seg-status">
    <button class="segment active" data-value="">All</button>
    <button class="segment" data-value="Backlog">Backlog</button>
    <button class="segment" data-value="Ready">Ready</button>
    <button class="segment" data-value="In Progress">In Progress</button>
    <button class="segment" data-value="In Review">In Review</button>
    <button class="segment" data-value="Done">Done</button>
  </div>
</div>

<main>
  <div id="gantt-container"></div>
  <div class="empty-state" id="empty" style="display:none">
    <p>No tasks found</p>
    <small>Adjust filters or check your Notion connection</small>
  </div>
</main>
<div class="toast" id="toast"></div>

<script>
  document.querySelectorAll('.segmented-control').forEach(control => {
    const hiddenInput = control.previousElementSibling;
    control.querySelectorAll('.segment').forEach(btn => {
      btn.addEventListener('click', () => {
        control.querySelectorAll('.segment').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        hiddenInput.value = btn.dataset.value;
        render();
      });
    });
  });

  let allTasks = [];
  let hierarchy = {};
  const todayStr = new Date().toISOString().split('T')[0];
  const DAY_WIDTH = 40;
  const ROW_HEIGHT = 40;

  function statusClass(s) {
    return { Backlog:'s-backlog', Ready:'s-ready', 'In Progress':'s-progress', 'In Review':'s-review', Done:'s-done' }[s] || 's-backlog';
  }
  function priorityDotClass(p) {
    return { Urgent:'p-urgent', High:'p-high', Medium:'p-medium', Low:'p-low' }[p] || '';
  }
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildHierarchy(tasks) {
    const byId = {};
    tasks.forEach(t => byId[t.id] = t);
    const childrenOf = {};
    const parentOf = {};
    tasks.forEach(t => {
      if (t.parentTaskId && byId[t.parentTaskId]) {
        if (!childrenOf[t.parentTaskId]) childrenOf[t.parentTaskId] = [];
        childrenOf[t.parentTaskId].push(t);
        parentOf[t.id] = byId[t.parentTaskId];
      }
    });
    const statsOf = {};
    Object.keys(childrenOf).forEach(pid => {
      const children = childrenOf[pid];
      statsOf[pid] = { total: children.length, done: children.filter(c => c.status === 'Done').length };
    });
    return { childrenOf, parentOf, statsOf };
  }

  function daysBetween(a, b) {
    return Math.round((new Date(b) - new Date(a)) / 86400000);
  }

  function addDays(dateStr, n) {
    const d = new Date(dateStr);
    d.setDate(d.getDate() + n);
    return d.toISOString().split('T')[0];
  }

  function getTaskDates(t) {
    if (!t.dueDate) return null;
    const endDate = t.dueDate;
    const duration = 1;
    let startDate;
    if (t.dispatchedAt) {
      startDate = t.dispatchedAt.split('T')[0];
    } else {
      startDate = addDays(endDate, -(duration - 1));
    }
    if (startDate > endDate) startDate = endDate;
    return { start: startDate, end: endDate };
  }

  function render() {
    hierarchy = buildHierarchy(allTasks);
    const search = document.getElementById('search').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    const filtered = allTasks.filter(t =>
      (!search || t.title.toLowerCase().includes(search) || (t.description||'').toLowerCase().includes(search)) &&
      (!status || t.status === status)
    );

    document.getElementById('task-count').textContent = `${filtered.length} tasks`;

    if (filtered.length === 0) {
      document.getElementById('gantt-container').innerHTML = '';
      document.getElementById('empty').style.display = '';
      return;
    }
    document.getElementById('empty').style.display = 'none';

    // Compute date range
    let minDate = null, maxDate = null;
    const taskDatesMap = new Map();

    filtered.forEach(t => {
      const dates = getTaskDates(t);
      if (dates) {
        taskDatesMap.set(t.id, dates);
        if (!minDate || dates.start < minDate) minDate = dates.start;
        if (!maxDate || dates.end > maxDate) maxDate = dates.end;
      }
    });

    if (!minDate) {
      minDate = todayStr;
      maxDate = addDays(todayStr, 14);
    }

    // Add padding
    minDate = addDays(minDate, -3);
    maxDate = addDays(maxDate, 5);

    // Ensure today is visible
    if (todayStr < minDate) minDate = addDays(todayStr, -3);
    if (todayStr > maxDate) maxDate = addDays(todayStr, 5);

    const totalDays = daysBetween(minDate, maxDate) + 1;
    const timelineWidth = totalDays * DAY_WIDTH;

    // Build left panel
    let leftHtml = '<div class="gantt-left-header">Task</div>';
    filtered.forEach(t => {
      const pDot = t.priority ? `<span class="priority-dot ${priorityDotClass(t.priority)}"></span>` : '';
      const noDt = !taskDatesMap.has(t.id) ? ' no-date' : '';
      const rowParent = hierarchy.parentOf[t.id];
      const parentLabel = rowParent ? `<span class="parent-label">${esc(rowParent.title)} &rsaquo;</span>` : '';
      const rowStats = hierarchy.statsOf[t.id];
      const nameText = rowStats ? `${esc(t.title)} (${rowStats.done}/${rowStats.total})` : esc(t.title);
      leftHtml += `<div class="gantt-task-row" onclick="copyId('${t.id}')">
        ${pDot}
        <span class="badge ${statusClass(t.status)}" style="padding:2px 6px;font-size:10px;">${esc(t.status)}</span>
        <span class="gantt-task-name${noDt}" title="${esc(t.title)}">${parentLabel}${nameText}</span>
      </div>`;
    });

    // Build date header
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let dateHeaderHtml = '';
    for (let i = 0; i < totalDays; i++) {
      const d = addDays(minDate, i);
      const dt = new Date(d);
      const dow = dt.getDay();
      const isWeekend = dow === 0 || dow === 6;
      const isToday = d === todayStr;
      const cls = [];
      if (isWeekend) cls.push('weekend');
      if (isToday) cls.push('today');
      dateHeaderHtml += `<div class="gantt-date-cell${cls.length ? ' ' + cls.join(' ') : ''}">
        <span class="gantt-date-dow">${dayNames[dow]}</span>
        <span class="gantt-date-day">${dt.getDate()}</span>
      </div>`;
    }

    // Build bar rows
    let barsHtml = '';
    const barPositions = new Map();

    filtered.forEach((t, idx) => {
      // Background grid
      let bgHtml = '';
      for (let i = 0; i < totalDays; i++) {
        const d = addDays(minDate, i);
        const dt = new Date(d);
        const dow = dt.getDay();
        const isWeekend = dow === 0 || dow === 6;
        bgHtml += `<div class="gantt-bar-bg-cell${isWeekend ? ' weekend' : ''}"></div>`;
      }

      let barHtml = '';
      const dates = taskDatesMap.get(t.id);
      if (dates) {
        const startOffset = daysBetween(minDate, dates.start);
        const duration = daysBetween(dates.start, dates.end) + 1;
        const left = startOffset * DAY_WIDTH;
        const width = Math.max(duration * DAY_WIDTH - 4, DAY_WIDTH - 4);

        barPositions.set(t.id, {
          left: left,
          right: left + width,
          top: idx * ROW_HEIGHT,
          centerY: idx * ROW_HEIGHT + ROW_HEIGHT / 2
        });

        barHtml = `<div class="gantt-bar ${statusClass(t.status)}" style="left:${left + 2}px;width:${width}px;" onclick="copyId('${t.id}')" title="${esc(t.title)}">${esc(t.title)}</div>`;
      }

      barsHtml += `<div class="gantt-bar-row"><div class="gantt-bar-bg">${bgHtml}</div>${barHtml}</div>`;
    });

    // Today line
    const todayOffset = daysBetween(minDate, todayStr);
    const todayLeft = todayOffset * DAY_WIDTH + DAY_WIDTH / 2;
    const todayLineHtml = (todayOffset >= 0 && todayOffset < totalDays)
      ? `<div class="today-line" style="left:${todayLeft}px"></div>` : '';

    // SVG dependency arrows
    let svgHtml = '';
    const arrowPaths = [];
    filtered.forEach(t => {
      if (!t.blockedBy || !t.blockedBy.length) return;
      const toPos = barPositions.get(t.id);
      if (!toPos) return;

      t.blockedBy.forEach(depId => {
        const fromPos = barPositions.get(depId);
        if (!fromPos) return;

        const startX = fromPos.right + 2;
        const startY = fromPos.centerY;
        const endX = toPos.left;
        const endY = toPos.centerY;
        const midX = startX + (endX - startX) / 2;

        arrowPaths.push(`<path class="dep-arrow" d="M${startX},${startY} C${midX},${startY} ${midX},${endY} ${endX},${endY}"/>`);
        arrowPaths.push(`<polygon class="dep-arrowhead" points="${endX},${endY} ${endX-6},${endY-3} ${endX-6},${endY+3}"/>`);
      });
    });

    if (arrowPaths.length) {
      svgHtml = `<svg class="dependency-svg" style="width:${timelineWidth}px;height:${filtered.length * ROW_HEIGHT}px">${arrowPaths.join('')}</svg>`;
    }

    const rightHtml = `
      <div class="gantt-timeline" style="width:${timelineWidth}px">
        <div class="gantt-date-header">${dateHeaderHtml}</div>
        <div class="gantt-bars" style="position:relative">
          ${todayLineHtml}
          ${svgHtml}
          ${barsHtml}
        </div>
      </div>`;

    document.getElementById('gantt-container').innerHTML = `
      <div class="gantt-wrapper">
        <div class="gantt-left">${leftHtml}</div>
        <div class="gantt-right">${rightHtml}</div>
      </div>`;

    // Scroll to today
    const rightEl = document.querySelector('.gantt-right');
    if (rightEl && todayOffset >= 0) {
      rightEl.scrollLeft = Math.max(0, todayLeft - rightEl.clientWidth / 2);
    }
  }

  function copyId(id) {
    navigator.clipboard.writeText(id).catch(()=>{});
    showToast('ID copied: ' + id.slice(0,8) + '...');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  document.getElementById('search').addEventListener('input', render);

  async function fetchTasks() {
    try {
      const res = await fetch('/api/tasks');
      if (!res.ok) throw new Error(res.statusText);
      const data = await res.json();
      allTasks = data.tasks || [];
      document.getElementById('updated-at').textContent = data.updatedAt ? `Updated: ${new Date(data.updatedAt).toLocaleTimeString()}` : '';
      render();
    } catch(e) {
      document.getElementById('sse-status').textContent = 'Error: ' + e.message;
    }
  }

  function connectSSE() {
    const dot = document.getElementById('sse-dot');
    const status = document.getElementById('sse-status');
    const es = new EventSource('/api/events');
    es.addEventListener('connected', () => {
      dot.classList.remove('disconnected');
      status.textContent = 'Live';
    });
    es.addEventListener('refresh', (e) => {
      try {
        const data = JSON.parse(e.data);
        allTasks = data.tasks || [];
        document.getElementById('updated-at').textContent = data.updatedAt ? `Updated: ${new Date(data.updatedAt).toLocaleTimeString()}` : '';
        render();
      } catch(err) { fetchTasks(); }
    });
    es.onerror = () => {
      dot.classList.add('disconnected');
      status.textContent = 'Reconnecting...';
      es.close();
      setTimeout(connectSSE, 3000);
    };
  }

  fetchTasks();
  connectSSE();
</script>
</body>
</html>
