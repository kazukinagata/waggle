<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks — Gantt Chart</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="filter-bar.css">
  <link rel="stylesheet" href="detail-panel.css">
  <style>
    /* Gantt layout */
    main {
      padding: 0 24px 24px;
      overflow: hidden;
    }

    .gantt-wrapper {
      display: flex;
      border: 0.5px solid var(--separator);
      border-radius: var(--radius-card);
      overflow: hidden;
      position: relative;
    }

    .gantt-left {
      min-width: 250px;
      max-width: 250px;
      background: var(--surface-primary);
      border-right: 0.5px solid var(--separator);
      flex-shrink: 0;
      z-index: 10;
    }

    .gantt-left-header {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--label-tertiary);
      border-bottom: 0.5px solid var(--separator);
      background: var(--surface-primary);
    }

    .gantt-task-row {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 16px;
      border-bottom: 0.5px solid var(--separator);
      cursor: pointer;
      transition: background var(--transition);
    }

    .gantt-task-row:hover { background: var(--surface-tertiary); }
    .gantt-task-row:last-child { border-bottom: none; }

    .gantt-task-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .gantt-task-name.no-date { color: var(--label-tertiary); }

    .gantt-task-row .badge { padding: 2px 6px; font-size: 10px; }

    .gantt-right {
      flex: 1;
      overflow-x: auto;
      position: relative;
    }

    .gantt-timeline {
      position: relative;
      min-width: 100%;
    }

    .gantt-date-header {
      display: flex;
      height: 52px;
      border-bottom: 0.5px solid var(--separator);
      position: sticky;
      top: 0;
      background: var(--surface-primary);
      z-index: 5;
    }

    .gantt-date-cell {
      min-width: 40px;
      width: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-right: 0.5px solid var(--separator);
      flex-shrink: 0;
    }

    .gantt-date-cell:last-child { border-right: none; }

    .gantt-date-dow {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--label-tertiary);
    }

    .gantt-date-day {
      font-size: 13px;
      font-weight: 500;
      color: var(--label-secondary);
    }

    .gantt-date-cell.today .gantt-date-day {
      color: var(--blue);
      font-weight: 700;
    }

    .gantt-date-cell.weekend { background: rgba(255,255,255,0.02); }

    .gantt-bars { position: relative; }

    .gantt-bar-row {
      height: 40px;
      position: relative;
      border-bottom: 0.5px solid var(--separator);
    }

    .gantt-bar-row:last-child { border-bottom: none; }

    .gantt-bar-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
    }

    .gantt-bar-bg-cell {
      min-width: 40px;
      width: 40px;
      border-right: 0.5px solid var(--separator);
      flex-shrink: 0;
    }

    .gantt-bar-bg-cell.weekend { background: rgba(255,255,255,0.02); }
    .gantt-bar-bg-cell:last-child { border-right: none; }

    .gantt-bar {
      position: absolute;
      top: 8px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--label-primary);
      cursor: pointer;
      transition: filter var(--transition);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 2;
    }

    .gantt-bar:hover { filter: brightness(1.3); }

    .gantt-bar.s-backlog  { background: rgba(152,152,157,0.35); }
    .gantt-bar.s-ready    { background: rgba(94,92,230,0.35); }
    .gantt-bar.s-progress { background: rgba(255,159,10,0.35); }
    .gantt-bar.s-review   { background: rgba(191,90,242,0.35); }
    .gantt-bar.s-done     { background: rgba(48,209,88,0.35); }
    .gantt-bar.s-blocked  { background: rgba(255,69,58,0.35); }

    .gantt-bar.no-date {
      background: rgba(152,152,157,0.15);
      border: 1px dashed var(--gray);
      color: var(--label-tertiary);
    }

    .parent-label {
      font-size: 10px;
      color: var(--label-tertiary);
      font-weight: 400;
      margin-right: 4px;
    }

    /* Today line */
    .today-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--red);
      z-index: 3;
      pointer-events: none;
    }

    .today-line::before {
      content: 'Today';
      position: absolute;
      top: -20px;
      left: -16px;
      font-size: 9px;
      font-weight: 600;
      color: var(--red);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* SVG arrows */
    .dependency-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .dep-arrow {
      fill: none;
      stroke: var(--label-tertiary);
      stroke-width: 1.5;
      opacity: 0.5;
    }

    .dep-arrowhead {
      fill: var(--label-tertiary);
      opacity: 0.5;
    }
  </style>
</head>
<body>
<header>
  <div class="header-title-group">
    <h1>Gantt Chart</h1>
    <div class="header-meta">
      <div class="sse-indicator">
        <span class="sse-dot disconnected" id="sse-dot"></span>
        <span id="sse-status">Connecting...</span>
      </div>
      <div class="header-stats">
        <span id="task-count"></span>
        <span id="updated-at"></span>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="Waggle.refreshTasks()" title="Refresh"><span class="refresh-icon">&#x21BB;</span></button>
    </div>
  </div>
  <a href="/selector.html" class="back-link">&#8592; Views</a>
</header>

<div id="filter-bar"></div>

<main>
  <div id="gantt-container"></div>
  <div class="empty-state" id="empty" style="display:none">
    <p>No tasks found</p>
    <small>Adjust filters or check your data source connection</small>
  </div>
</main>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script src="filter-bar.js"></script>
<script src="detail-panel.js"></script>
<script>
  var W = Waggle;
  var DAY_WIDTH = 40;
  var ROW_HEIGHT = 40;

  function daysBetween(a, b) {
    return Math.round((new Date(b) - new Date(a)) / 86400000);
  }

  function addDays(dateStr, n) {
    var d = new Date(dateStr);
    d.setDate(d.getDate() + n);
    return d.toISOString().split('T')[0];
  }

  function getTaskDates(t) {
    if (!t.dueDate) return null;
    var endDate = t.dueDate;
    var startDate;
    if (t.dispatchedAt) {
      startDate = t.dispatchedAt.split('T')[0];
    } else {
      startDate = endDate;
    }
    if (startDate > endDate) startDate = endDate;
    return { start: startDate, end: endDate };
  }

  function render() {
    var hierarchy = W.buildHierarchy(W.allTasks);
    var filtered = W.getFiltered();

    document.getElementById('task-count').textContent = filtered.length + ' tasks';

    if (filtered.length === 0) {
      document.getElementById('gantt-container').innerHTML = '';
      document.getElementById('empty').style.display = '';
      return;
    }
    document.getElementById('empty').style.display = 'none';

    // Compute date range
    var minDate = null, maxDate = null;
    var taskDatesMap = new Map();

    filtered.forEach(function (t) {
      var dates = getTaskDates(t);
      if (dates) {
        taskDatesMap.set(t.id, dates);
        if (!minDate || dates.start < minDate) minDate = dates.start;
        if (!maxDate || dates.end > maxDate) maxDate = dates.end;
      }
    });

    if (!minDate) {
      minDate = W.today;
      maxDate = addDays(W.today, 14);
    }

    minDate = addDays(minDate, -3);
    maxDate = addDays(maxDate, 5);

    if (W.today < minDate) minDate = addDays(W.today, -3);
    if (W.today > maxDate) maxDate = addDays(W.today, 5);

    var totalDays = daysBetween(minDate, maxDate) + 1;
    var timelineWidth = totalDays * DAY_WIDTH;

    // Build left panel
    var leftHtml = '<div class="gantt-left-header">Task</div>';
    filtered.forEach(function (t) {
      var pDot = t.priority ? '<span class="priority-dot ' + W.priorityClass(t.priority) + '"></span>' : '';
      var noDt = !taskDatesMap.has(t.id) ? ' no-date' : '';
      var rowParent = hierarchy.parentOf[t.id];
      var parentLabel = rowParent ? '<span class="parent-label">' + W.esc(rowParent.title) + ' &rsaquo;</span>' : '';
      var rowStats = hierarchy.statsOf[t.id];
      var nameText = rowStats ? W.esc(t.title) + ' (' + rowStats.done + '/' + rowStats.total + ')' : W.esc(t.title);
      leftHtml += '<div class="gantt-task-row" onclick="Waggle.openDetail(\'' + t.id + '\')" data-task-id="' + t.id + '">' +
        pDot +
        '<span class="badge ' + W.statusClass(t.status) + '">' + W.esc(t.status) + '</span>' +
        '<span class="gantt-task-name' + noDt + '" title="' + W.esc(t.title) + '">' + parentLabel + nameText + '</span>' +
      '</div>';
    });

    // Build date header
    var dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    var dateHeaderHtml = '';
    for (var i = 0; i < totalDays; i++) {
      var d = addDays(minDate, i);
      var dt = new Date(d);
      var dow = dt.getDay();
      var isWeekend = dow === 0 || dow === 6;
      var isToday = d === W.today;
      var cls = [];
      if (isWeekend) cls.push('weekend');
      if (isToday) cls.push('today');
      dateHeaderHtml += '<div class="gantt-date-cell' + (cls.length ? ' ' + cls.join(' ') : '') + '">' +
        '<span class="gantt-date-dow">' + dayNames[dow] + '</span>' +
        '<span class="gantt-date-day">' + dt.getDate() + '</span>' +
      '</div>';
    }

    // Build bar rows
    var barsHtml = '';
    var barPositions = new Map();

    filtered.forEach(function (t, idx) {
      var bgHtml = '';
      for (var i = 0; i < totalDays; i++) {
        var d = addDays(minDate, i);
        var dt = new Date(d);
        var dow = dt.getDay();
        var isWeekend = dow === 0 || dow === 6;
        bgHtml += '<div class="gantt-bar-bg-cell' + (isWeekend ? ' weekend' : '') + '"></div>';
      }

      var barHtml = '';
      var dates = taskDatesMap.get(t.id);
      if (dates) {
        var startOffset = daysBetween(minDate, dates.start);
        var duration = daysBetween(dates.start, dates.end) + 1;
        var left = startOffset * DAY_WIDTH;
        var width = Math.max(duration * DAY_WIDTH - 4, DAY_WIDTH - 4);

        barPositions.set(t.id, {
          left: left,
          right: left + width,
          top: idx * ROW_HEIGHT,
          centerY: idx * ROW_HEIGHT + ROW_HEIGHT / 2
        });

        barHtml = '<div class="gantt-bar ' + W.statusClass(t.status) + '" style="left:' + (left + 2) + 'px;width:' + width + 'px;" onclick="Waggle.openDetail(\'' + t.id + '\')" data-task-id="' + t.id + '" title="' + W.esc(t.title) + '">' + W.esc(t.title) + '</div>';
      }

      barsHtml += '<div class="gantt-bar-row"><div class="gantt-bar-bg">' + bgHtml + '</div>' + barHtml + '</div>';
    });

    // Today line
    var todayOffset = daysBetween(minDate, W.today);
    var todayLeft = todayOffset * DAY_WIDTH + DAY_WIDTH / 2;
    var todayLineHtml = (todayOffset >= 0 && todayOffset < totalDays)
      ? '<div class="today-line" style="left:' + todayLeft + 'px"></div>' : '';

    // SVG dependency arrows
    var arrowPaths = [];
    filtered.forEach(function (t) {
      if (!t.blockedBy || !t.blockedBy.length) return;
      var toPos = barPositions.get(t.id);
      if (!toPos) return;

      t.blockedBy.forEach(function (depId) {
        var fromPos = barPositions.get(depId);
        if (!fromPos) return;

        var startX = fromPos.right + 2;
        var startY = fromPos.centerY;
        var endX = toPos.left;
        var endY = toPos.centerY;
        var midX = startX + (endX - startX) / 2;

        arrowPaths.push('<path class="dep-arrow" d="M' + startX + ',' + startY + ' C' + midX + ',' + startY + ' ' + midX + ',' + endY + ' ' + endX + ',' + endY + '"/>');
        arrowPaths.push('<polygon class="dep-arrowhead" points="' + endX + ',' + endY + ' ' + (endX - 6) + ',' + (endY - 3) + ' ' + (endX - 6) + ',' + (endY + 3) + '"/>');
      });
    });

    var svgHtml = arrowPaths.length
      ? '<svg class="dependency-svg" style="width:' + timelineWidth + 'px;height:' + (filtered.length * ROW_HEIGHT) + 'px">' + arrowPaths.join('') + '</svg>'
      : '';

    var rightHtml = '<div class="gantt-timeline" style="width:' + timelineWidth + 'px">' +
      '<div class="gantt-date-header">' + dateHeaderHtml + '</div>' +
      '<div class="gantt-bars" style="position:relative">' +
        todayLineHtml + svgHtml + barsHtml +
      '</div>' +
    '</div>';

    document.getElementById('gantt-container').innerHTML =
      '<div class="gantt-wrapper">' +
        '<div class="gantt-left">' + leftHtml + '</div>' +
        '<div class="gantt-right">' + rightHtml + '</div>' +
      '</div>';

    // Scroll to today
    var rightEl = document.querySelector('.gantt-right');
    if (rightEl && todayOffset >= 0) {
      rightEl.scrollLeft = Math.max(0, todayLeft - rightEl.clientWidth / 2);
    }
  }

  W.initKeyboard({
    getNavigableTasks: function () {
      return W.getFiltered().map(function (t) { return t.id; });
    },
    getTaskElement: function (taskId) {
      return document.querySelector('.gantt-task-row[data-task-id="' + taskId + '"]');
    }
  });

  W.loadFiltersFromURL();
  W.onDataUpdate = render;
  W.initData();
</script>
</body>
</html>
